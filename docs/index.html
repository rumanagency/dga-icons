<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DGA Icons - Premium Open Source Library</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="navbar">
        <div class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
                <polyline points="2 17 12 22 22 17"></polyline>
                <polyline points="2 12 12 17 22 12"></polyline>
            </svg>
            <span>DGA Icons</span>
        </div>
        <div class="nav-links">
            <a href="https://github.com/rumanagency/dga-icons" target="_blank">GitHub</a>
        </div>
    </header>

    <main class="container">
        <div class="hero">
            <h1>Beautifully crafted icons</h1>
            <p>A massive collection of <strong id="total-count">4,300+</strong> premium icons across 9 styles, fully tree-shakable and open-source.</p>
        </div>

        <div class="controls">
            <div class="search-container">
                <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" id="search" placeholder="Search icons (e.g. user, home, arrow)..." autocomplete="off" />
            </div>

            <div class="style-selector-wrapper">
                <select id="style-selector">
                    <option value="stroke-rounded" selected>Stroke Rounded</option>
                    <option value="solid-rounded">Solid Rounded</option>
                    <option value="bulk-rounded">Bulk Rounded</option>
                    <option value="duotone-rounded">Duotone Rounded</option>
                    <option value="twotone-rounded">Twotone Rounded</option>
                    <option value="solid-sharp">Solid Sharp</option>
                    <option value="stroke-sharp">Stroke Sharp</option>
                    <option value="solid-standard">Solid Standard</option>
                    <option value="stroke-standard">Stroke Standard</option>
                </select>
            </div>
        </div>

        <div class="stats">
            <span id="results-count">Loading icons...</span>
        </div>

        <div class="icon-grid" id="icon-grid">
            <!-- Icons injected by JS -->
        </div>

        <div id="loading-trigger" class="loading-trigger">
            <div class="spinner"></div>
        </div>
        
        <footer class="docs-footer">
            <div class="credits">
                <p>Designed by <strong>DGA</strong> &bull; Developed by <strong>Ruman Agency</strong></p>
                <div class="logos">
                    <img src="../assets/DGA_logo.png" alt="DGA Logo" height="40" />
                    <img src="../assets/Ruman_logo.svg" alt="Ruman Logo" height="40" />
                </div>
                <p class="made-by">صنع بـ ❤️ صالح <br/> Made by Saleh</p>
            </div>
        </footer>
    </main>

    <!-- Copy Modal / Toast -->
    <div id="toast" class="toast">Copied to clipboard!</div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <button class="modal-close" id="modal-close">&times;</button>
            <div class="modal-header">
                <div class="modal-icon-preview" id="modal-preview"></div>
                <h2 id="modal-title">IconName</h2>
            </div>
            
            <div class="copy-section">
                <label>React</label>
                <div class="code-block">
                    <code id="code-react"></code>
                    <button class="copy-btn" data-target="code-react">Copy</button>
                </div>
            </div>

            <div class="copy-section">
                <label>Vue</label>
                <div class="code-block">
                    <code id="code-vue"></code>
                    <button class="copy-btn" data-target="code-vue">Copy</button>
                </div>
            </div>

            <div class="copy-section">
                <label>Vanilla JS</label>
                <div class="code-block">
                    <code id="code-js"></code>
                    <button class="copy-btn" data-target="code-js">Copy</button>
                </div>
            </div>

            <div class="copy-section">
                <label>Raw SVG</label>
                <div class="code-block">
                    <code id="code-svg"></code>
                    <button class="copy-btn" data-target="code-svg">Copy</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
